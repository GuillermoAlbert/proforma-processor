{% extends 'base.html' %}
{% block title %}{{ 'Editar cliente' if cliente else 'Nuevo cliente' }}{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{{ 'Editar cliente' if cliente else 'Nuevo cliente' }}</h1>
</div>

<div class="card form-card">
  <form method="post">
    <div class="form-grid">
      <div class="form-group full">
        <label for="nombre_agencia">Nombre de agencia *</label>
        <input type="text" id="nombre_agencia" name="nombre_agencia" required
               value="{{ cliente.nombre_agencia if cliente else '' }}">
      </div>
      <div class="form-group">
        <label for="nif_cif">NIF / CIF</label>
        <div style="display:flex; gap:6px; align-items:center;">
          <input type="text" id="nif_cif" name="nif_cif" style="flex:1; min-width:0;"
                 value="{{ cliente.nif_cif if cliente else '' }}">
          <button type="button" id="btn-buscar-cif" class="btn btn-secondary btn-sm"
                  style="flex-shrink:0; white-space:nowrap;" title="Buscar datos de empresa (VIES + einforma)">🔍 Buscar datos</button>
        </div>
        <span id="cif-status" style="font-size:12px; margin-top:3px; min-height:16px; display:block;"></span>
      </div>
      <div class="form-group">
        <label for="codigo_factusol">Código Factusol</label>
        <input type="text" id="codigo_factusol" name="codigo_factusol"
               value="{{ cliente.codigo_factusol if cliente else '' }}">
      </div>
      <div class="form-group full">
        <label for="direccion">Dirección</label>
        <input type="text" id="direccion" name="direccion"
               value="{{ cliente.direccion if cliente else '' }}">
      </div>
      <div class="form-group">
        <label for="cp">Código postal</label>
        <input type="text" id="cp" name="cp"
               value="{{ cliente.cp if cliente else '' }}">
      </div>
      <div class="form-group">
        <label for="poblacion">Población</label>
        <input type="text" id="poblacion" name="poblacion"
               value="{{ cliente.poblacion if cliente else '' }}">
      </div>
      <div class="form-group">
        <label for="provincia">Provincia</label>
        <input type="text" id="provincia" name="provincia"
               value="{{ cliente.provincia if cliente else '' }}">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email"
               value="{{ cliente.email if cliente else '' }}">
      </div>
      <div class="form-group">
        <label for="telefono">Teléfono</label>
        <input type="text" id="telefono" name="telefono"
               value="{{ cliente.telefono if cliente else '' }}">
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Guardar</button>
      <a href="{{ url_for('clientes_lista') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>

<style>
  .vies-highlight {
    transition: background-color 0.2s;
    background-color: #fffbcc !important;
  }
  #cif-status.status-ok    { color: #065F46; }
  #cif-status.status-error { color: #991B1B; }
  #cif-status.status-info  { color: var(--stone); }
</style>

<script>
(function () {
  const btn    = document.getElementById('btn-buscar-cif');
  const status = document.getElementById('cif-status');
  const FIELDS = ['nombre_agencia', 'direccion', 'cp', 'poblacion', 'provincia'];

  function setStatus(msg, tipo) {
    status.textContent = msg;
    status.className   = 'status-' + tipo;
  }

  function highlight(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.add('vies-highlight');
    setTimeout(function () { el.classList.remove('vies-highlight'); }, 1800);
  }

  btn.addEventListener('click', function () {
    const cif = document.getElementById('nif_cif').value.trim();
    if (!cif) {
      setStatus('Introduce un CIF/NIF primero.', 'error');
      return;
    }
    btn.disabled = true;
    setStatus('Buscando…', 'info');

    fetch('/clientes/lookup?cif=' + encodeURIComponent(cif))
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.ok) {
          // Rellenar los campos sugeridos (marcados en amarillo para revisión).
          FIELDS.forEach(function (id) {
            var val = data.fields && data.fields[id];
            if (val) {
              document.getElementById(id).value = val;
              highlight(id);
            }
          });
          setStatus((data.message || 'CIF válido.') + (
            (data.fields && (data.fields.nombre_agencia || data.fields.direccion))
              ? ' Datos sugeridos — verifica antes de guardar.' : ''
          ), 'ok');
        } else {
          setStatus(data.message || 'No se encontraron datos.', 'error');
        }
      })
      .catch(function (err) {
        setStatus('Error de red al consultar VIES.', 'error');
        console.error('VIES lookup error:', err);
      })
      .finally(function () {
        btn.disabled = false;
      });
  });

  // CP → provincia: al completar el código postal, autocompleta la provincia
  // usando la tabla local del servidor (sin red externa).
  var cpInput   = document.getElementById('cp');
  var provInput = document.getElementById('provincia');
  if (cpInput && provInput) {
    cpInput.addEventListener('change', function () {
      var cp = cpInput.value.trim();
      if (cp.length < 5) return;
      fetch('/clientes/provincia?cp=' + encodeURIComponent(cp))
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data.provincia) {
            provInput.value = data.provincia;
            highlight('provincia');
          }
        })
        .catch(function () { /* silencioso: la provincia se puede escribir a mano */ });
    });
  }
}());
</script>
{% endblock %}
