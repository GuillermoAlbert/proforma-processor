{% extends 'base.html' %}
{% block title %}{{ 'Editar artículo' if articulo else 'Nuevo artículo' }}{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{{ 'Editar artículo' if articulo else 'Nuevo artículo' }}</h1>
</div>

<div class="card form-card">
  <form method="post">
    <div class="form-grid">
      <div class="form-group">
        <label for="codigo">Código</label>
        <input type="text" id="codigo" name="codigo"
               value="{{ articulo.codigo if articulo else '' }}">
      </div>
      <div class="form-group">
        <label for="familia">Familia</label>
        <input type="text" id="familia" name="familia"
               value="{{ articulo.familia if articulo else '' }}">
      </div>
      <div class="form-group full">
        <label for="descripcion">Descripción *</label>
        <input type="text" id="descripcion" name="descripcion" required
               value="{{ articulo.descripcion if articulo else '' }}">
      </div>
      <div class="form-group">
        <label for="precio">Precio unitario (€)</label>
        <input type="number" id="precio" name="precio" step="0.01" min="0"
               value="{{ articulo.precio if articulo else '0' }}">
      </div>
      <div class="form-group">
        <label for="porcentaje_iva">IVA (%)</label>
        <input type="number" id="porcentaje_iva" name="porcentaje_iva" step="0.1" min="0"
               value="{{ articulo.porcentaje_iva if articulo else '21' }}">
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Guardar</button>
      <a href="{{ url_for('articulos_lista') }}" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
